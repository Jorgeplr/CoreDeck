services:
  mysql:
    image: mysql:8.0
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD}
      MYSQL_DATABASE: coredesk
      MYSQL_USER: coredesk_user
      MYSQL_PASSWORD: ${MYSQL_PASSWORD}
    volumes:
      - mysql_data:/var/lib/mysql
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p${MYSQL_ROOT_PASSWORD}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - coredesk

  api:
    build:
      context: ./packages/api
      dockerfile: Dockerfile
    restart: always
    depends_on:
      mysql:
        condition: service_healthy
    environment:
      DATABASE_URL: mysql://coredesk_user:${MYSQL_PASSWORD}@mysql:3306/coredesk
      JWT_SECRET: ${JWT_SECRET}
      JWT_EXPIRES_IN: 15m
      REFRESH_TOKEN_EXPIRES_DAYS: 7
      COOKIE_SECRET: ${COOKIE_SECRET}
      NODE_ENV: production
      PORT: 3001
      CORS_ORIGIN: ${CORS_ORIGIN}
      SMTP_HOST: ${SMTP_HOST}
      SMTP_PORT: ${SMTP_PORT:-587}
      SMTP_SECURE: ${SMTP_SECURE:-false}
      SMTP_USER: ${SMTP_USER}
      SMTP_PASS: ${SMTP_PASS}
      EMAIL_FROM: ${EMAIL_FROM:-"CoreDesk <noreply@coredesk.app>"}
      REMINDER_CHECK_CRON: "*/15 * * * *"
      REMINDER_NOTIFY_HOURS_BEFORE: 24
    expose:
      - "3001"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.coredesk-api.rule=Host(`coredesk-api.jorgelp.cloud`)"
      - "traefik.http.routers.coredesk-api.entrypoints=websecure"
      - "traefik.http.routers.coredesk-api.tls.certresolver=letsencrypt"
      - "traefik.http.services.coredesk-api.loadbalancer.server.port=3001"
    networks:
      - coredesk
      - dokploy-network

  app:
    build:
      context: ./packages/app
      dockerfile: Dockerfile
      args:
        VITE_API_URL: ${VITE_API_URL}
    restart: always
    expose:
      - "80"
    labels:
      - "traefik.enable=true"
      - "traefik.docker.network=dokploy-network"
      - "traefik.http.routers.coredesk-app.rule=Host(`coredesk.jorgelp.cloud`)"
      - "traefik.http.routers.coredesk-app.entrypoints=websecure"
      - "traefik.http.routers.coredesk-app.tls.certresolver=letsencrypt"
      - "traefik.http.services.coredesk-app.loadbalancer.server.port=80"
    networks:
      - coredesk
      - dokploy-network

networks:
  coredesk:
    driver: bridge
  dokploy-network:
    external: true

volumes:
  mysql_data:
