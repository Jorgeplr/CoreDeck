name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

jobs:
  # ─── API ──────────────────────────────────────────────────────────────────────
  api:
    name: API — typecheck & lint
    runs-on: ubuntu-latest

    services:
      mysql:
        image: mysql:8.0
        env:
          MYSQL_ROOT_PASSWORD: root
          MYSQL_DATABASE: coredesk_ci
        ports:
          - 3306:3306
        options: >-
          --health-cmd="mysqladmin ping -h 127.0.0.1"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5

    defaults:
      run:
        working-directory: packages/api

    env:
      DATABASE_URL: mysql://root:root@127.0.0.1:3306/coredesk_ci
      SHADOW_DATABASE_URL: mysql://root:root@127.0.0.1:3306/coredesk_ci_shadow
      JWT_SECRET: ci-secret-not-for-prod
      NODE_ENV: test

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Generate Prisma client
        run: bunx prisma generate

      - name: Typecheck
        run: bunx tsc --noEmit

  # ─── APP ──────────────────────────────────────────────────────────────────────
  app:
    name: App — typecheck & lint
    runs-on: ubuntu-latest

    defaults:
      run:
        working-directory: packages/app

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Typecheck
        run: bunx tsc -b --noEmit

      - name: Lint
        run: bun run lint

  # ─── BUILD CHECK ──────────────────────────────────────────────────────────────
  build:
    name: App — production build
    runs-on: ubuntu-latest
    needs: app

    defaults:
      run:
        working-directory: packages/app

    steps:
      - uses: actions/checkout@v4

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Build
        run: bun run build
        env:
          VITE_API_URL: http://localhost:3001/api
